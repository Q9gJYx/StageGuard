# AccuSleep mouse EEG - demo config used by notebooks/demo_stageguard.ipynb
# Dataset: AccuSleep (Barger et al. 2019), labels + EEG/EMG on OSF (https://osf.io/py5eb/)
# 3-state classification: Wake, NREM, REM. Native epoch length: 2.5 s (512 Hz).
# The demo downloads one mouse, trains the AccuSleep backbone EEG-only on four
# nights, and evaluates on a held-out night; see data/README.md for provenance.

dataset_name: AccuSleep (demo)
dataset_url: https://osf.io/py5eb/

stage_names: [Wake, NREM, REM]
num_classes: 3
epoch_sec: 2.5

# Rare transitions: direct Wake<->REM is physiologically rare in mice
rare_transitions:
  - [0, 2]  # Wake -> REM
  - [2, 0]  # REM -> Wake

# Soft transition penalty weight (kept low so the trained backbone still emits
# some rare-transition mass for the decoder to remove at inference)
lambda_trans: 0.1

# Semi-Markov decoder
d_max: 20         # duration counter ceiling (50 s at 2.5 s epochs)
epsilon: 5.0      # rare-transition penalty
gamma: 2.0        # anti-flip-flop penalty
k: 4              # flip-flop lookback window (epochs)
d_min: [2, 4, 2]  # min bout: Wake >= 5 s, NREM >= 10 s, REM >= 5 s

# Signal quality
sqi_method: spectral_entropy
sqi_threshold: 0.4
